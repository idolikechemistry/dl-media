name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: dl-media
            asset_name: dl-media-mac-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: dl-media.exe
            asset_name: dl-media-windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: dl-media
            asset_name: dl-media-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} ./${{ matrix.asset_name }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} ./${{ matrix.asset_name }}
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================================
      # 🍺 Homebrew 自動發佈模組 (僅限 macOS 節點執行)
      # =====================================================================
      - name: Update Homebrew Formula
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # 1. 計算剛打包出來的執行檔的 SHA256 校驗碼
          SHA256=$(shasum -a 256 ${{ matrix.asset_name }} | awk '{print $1}')
          
          # 2. 處理版本號 (從 git tag 中去掉前綴的 v)
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          
          # 3. 組合完整的 Release 下載網址
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${{ matrix.asset_name }}"
          
          # 4. 將雲端環境切換至一個乾淨的暫存資料夾，並 clone 你的 Tap 儲存庫
          cd $RUNNER_TEMP
          git clone https://${HOMEBREW_TAP_dl_media}@github.com/idolikechemistry/homebrew-dl-media.git
          cd homebrew-dl-media
          
          # 5. 設定 GitHub Actions 機器人的專屬身分
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 6. 使用 sed 指令精準替換 Ruby 檔案內的字串
          # (因為是在 macos-latest 上執行，必須使用 BSD sed 的 -i '' 語法)
          sed -i '' 's|url ".*"|url "'"$URL"'"|' Formula/dl-media.rb
          sed -i '' 's|version ".*"|version "'"$VERSION"'"|' Formula/dl-media.rb
          sed -i '' 's|sha256 ".*"|sha256 "'"$SHA256"'"|' Formula/dl-media.rb
          
          # 7. 提交變更並推送回你的 Tap 儲存庫
          git add Formula/dl-media.rb
          git commit -m "自動發布：dl-media 升級至 v$VERSION"
          git push origin main

# =====================================================================
# 🚀 終端機發布指令小抄 (自動讀取 Cargo.toml 版號)
# ⚠️ 執行前請務必確認已手動修改 Cargo.toml 內的 version 欄位！
# =====================================================================
#
# 發布版本 (兼容pre-release和release版本)
# 指令 (整段複製並在終端機執行)：
# VER=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
# git tag v$VER
# git push origin v$VER
# =====================================================================