name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: dl-media
            asset_name: dl-media-mac-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: dl-media.exe
            asset_name: dl-media-windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: dl-media
            asset_name: dl-media-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # 將檔案移動到根目錄並重新命名，方便稍後上傳
      - name: Prepare binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} ./${{ matrix.asset_name }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} ./${{ matrix.asset_name }}
          fi

      # 建立 Release 並將檔案掛載上去，自動判斷是否為預發布版本
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          # 如果 git tag 包含 '-' (如 v0.3.0-beta.1)，則設定為 Pre-release
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =====================================================================
# 🚀 終端機發布指令小抄 (自動讀取 Cargo.toml 版號)
# ⚠️ 執行前請務必確認已手動修改 Cargo.toml 內的 version 欄位！
# =====================================================================
#
# 發布版本 (兼容pre-release和release版本)
# 指令 (整段複製並在終端機執行)：
# VER=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
# git tag v$VER
# git push origin v$VER
# =====================================================================